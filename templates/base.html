<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Web Security Review Workbench" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/app.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary-subtle">
  <div class="container">
    <a class="navbar-brand" href="/">Web Security Review Workbench</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/targets">Targets</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  <div class="alert alert-warning subtle" role="alert">
    Only scan targets you own or are explicitly authorized to assess. This tool performs passive, non-destructive checks only.
  </div>

  {% block content %}{% endblock %}
</main>

<footer class="border-top border-secondary-subtle py-3">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="text-secondary small">Local-only • Passive review</div>
    <div class="text-secondary" style="font-size: 11px; opacity: 0.65;">Made by CJ</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
